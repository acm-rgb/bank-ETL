services:
  # Serviço do Pipeline ETL
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    container_name: bank_etl_pipeline
    volumes:
      # Monta a pasta data/ como volume compartilhado
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    # Executa o pipeline e sai (não fica rodando)
    profiles:
      - etl

  # Serviço do Streamlit
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: bank_etl_streamlit
    ports:
      # Mapeia porta 8501 do host para 8501 do container
      - "8501:8501"
    volumes:
      # Monta a pasta data/ como volume compartilhado
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped